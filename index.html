        // Generate binary profile art (seeded, deterministic)
        function generateBinaryProfile() {
            const rows = 20, cols = 36;
            let seed = 0xDEADBEEF;
            const rand = () => {
                seed ^= seed << 13; seed ^= seed >>> 17; seed ^= seed << 5;
                return (seed >>> 0) / 4294967296;
            };
            const lines = [];
            // Blank rows at top so the figure sits lower (profile feel)
            for (let i = 0; i < 4; i++) lines.push(' '.repeat(cols));
            for (let r = 0; r < rows; r++) {
                let line = '';
                const ny = r / rows;
                for (let c = 0; c < cols; c++) {
                    const nx = (c / cols - 0.5) * 2;
                    // Head ellipse
                    const hx = nx / 0.52, hy = (ny - 0.26) / 0.36;
                    const headDist = Math.sqrt(hx * hx + hy * hy);
                    // Hair (top of head, slightly denser)
                    const inHair = hy < -0.6 && headDist < 1.05;
                    // Neck
                    const inNeck = ny > 0.55 && ny < 0.64 && Math.abs(nx) < 0.16;
                    // Shoulders/body (trapezoid)
                    const sw = 0.45 + Math.max(0, ny - 0.64) * 1.4;
                    const inBody = ny >= 0.62 && ny < 1.0 && Math.abs(nx) < sw;
                    // Collar/shirt detail
                    const inCollar = ny > 0.63 && ny < 0.72 && Math.abs(nx) < 0.22;

                    let d;
                    if (inHair) d = 0.85;
                    else if (headDist < 0.72) d = 0.80;       // face interior (bright)
                    else if (headDist < 0.92) d = 0.60;       // face edge / jawline
                    else if (headDist < 1.05) d = 0.40;       // head outline fade
                    else if (inNeck) d = 0.65;
                    else if (inCollar) d = 0.72;
                    else if (inBody) d = 0.68;
                    else d = 0.14;                             // background (dark)

                    line += rand() < d ? '1' : '0';
                }
                lines.push(line);
            }
            return lines.join('\n');
        }

        // Add command line to history display
        function addCommandLine(cmd) {
            const div = document.createElement('div');

            div.innerHTML = `<span class="prompt-text"></span><span class="command-text">${cmd}</span>`;
            terminal.appendChild(div);

        // Levenshtein distance for "did you mean" suggestions
        function levenshtein(a, b) {
            const m = a.length, n = b.length;
            const dp = Array.from({length: m + 1}, (_, i) =>
                Array.from({length: n + 1}, (_, j) => i === 0 ? j : j === 0 ? i : 0)
            );
            for (let i = 1; i <= m; i++)
                for (let j = 1; j <= n; j++)
                    dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1]
                        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
            return dp[m][n];
        }

        function getSuggestions(input) {
            const allCmds = Object.keys(commands);

            // Prefix matches first (e.g. "ab" → "about")
            const prefix = allCmds.filter(cmd => cmd.startsWith(input));

            // Levenshtein fuzzy matches (e.g. "skils" → "skills")
            const threshold = Math.max(2, Math.floor(input.length / 2));
            const fuzzy = allCmds
                .filter(cmd => !prefix.includes(cmd))
                .map(cmd => ({cmd, dist: levenshtein(input, cmd)}))
                .filter(({dist}) => dist <= threshold)
                .sort((a, b) => a.dist - b.dist)
                .map(({cmd}) => cmd);

            return [...prefix, ...fuzzy].slice(0, 2);
        }

        // Process command
        function processCommand(cmd) {
            const trimmed = cmd.trim().toLowerCase();

            if (!trimmed) return;

            // Capture scroll position before adding new content
            const scrollBefore = terminal.scrollHeight;

            // Add to history
            addCommandLine(cmd);
            commandHistory.unshift(trimmed);
            historyIndex = -1;

            // Resolve alias → full command name
            const resolved = aliases[trimmed] || trimmed;

            // Execute command
            if (commands[resolved]) {
                const output = commands[resolved].execute();
                if (output) {
                    addOutput(output);
                }
            } else {
                const suggestions = getSuggestions(resolved);
                const hint = suggestions.length > 0
                    ? `\n<span class="dim">Did you mean <span class="warning">${suggestions.join('</span>, <span class="warning">')}</span>?</span>`
                    : '';
                addOutput(`<span class="error">Command not found: ${cmd}</span>${hint}\n\nType '<span class="warning">help</span>' to see all commands.`);
            }
            
            // Scroll to start of new content (not bottom)
            terminal.scrollTop = scrollBefore;
        }
        
        // Handle input
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmd = input.value;
                processCommand(cmd);
                input.value = '';
                cursorIndicator.style.display = 'inline';
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    input.value = commandHistory[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    input.value = commandHistory[historyIndex];
                } else {
                    historyIndex = -1;
                    input.value = '';
                }
            } else if (e.key === 'Tab') {
                e.preventDefault();
                const partial = input.value.toLowerCase();
                const matches = Object.keys(commands).filter(cmd => cmd.startsWith(partial));
                if (matches.length === 1) {
                    input.value = matches[0];
                }
            } else if (e.key === 'l' && e.ctrlKey) {
                e.preventDefault();
                commands.clear.execute();
            }
        });
        
        // Toggle cursor visibility based on input content
        input.addEventListener('input', () => {
            cursorIndicator.style.display = input.value.length > 0 ? 'none' : 'inline';
        });
        
        // Simulate typing a command into the input bar, then execute it
        function typeCommand(cmd) {
            input.focus();
            input.value = '';
            cursorIndicator.style.display = 'none';
            let i = 0;
            const interval = setInterval(() => {
                input.value += cmd[i];
                i++;
                if (i === cmd.length) {
                    clearInterval(interval);
                    setTimeout(() => {
                        processCommand(cmd);
                        input.value = '';
                        cursorIndicator.style.display = 'inline';
                    }, 180);
                }
            }, 60);
        }

        // Keep focus on input — tap the input bar area only on mobile
        const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
        document.querySelector('.input-line').addEventListener('click', () => {
            input.focus();
        });
        if (!isMobile) {
            // On desktop also focus on any click in the terminal area
            terminal.addEventListener('click', () => {
                input.focus();
            });
        }

        init();

        // iOS Safari: scroll to bottom when virtual keyboard resizes viewport
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                terminal.scrollTop = terminal.scrollHeight;
            });
        }
