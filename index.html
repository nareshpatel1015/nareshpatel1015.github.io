        // Initialize with welcome message
        function init() {
            const welcomeMsg = `
<span class="login-info">Last login: Sat Apr 11 2026</span>

<div class="portfolio-header">Naresh Patel - Founder & AI Engineer</div>
<span class="separator">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>

<div class="welcome-text">Type '<span class="warning">help</span>' to see available commands.
Type '<span class="warning">production</span>' to see my live AI work.
Type '<span class="warning">projects</span>' to explore what I've built.
Type '<span class="warning">skills</span>' to check my tech stack.</div>

<span class="dim">Tip: Use ↑/↓ arrows for command history</span>
`;
            addOutput(welcomeMsg);
            input.focus();
        }
        
        // Add output to terminal
        function addOutput(html) {
            const div = document.createElement('div');
            div.className = 'output-line';
            div.innerHTML = html;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }
        
        // Add command line to history display
        function addCommandLine(cmd) {
            const div = document.createElement('div');
            div.className = 'prompt-line';
            div.innerHTML = `<span class="prompt-text"></span><span class="command-text">${cmd}</span>`;
            terminal.appendChild(div);
        }
        
        // Process command
        function processCommand(cmd) {
            const trimmed = cmd.trim().toLowerCase();
            
            if (!trimmed) return;
            
            // Add to history
            addCommandLine(cmd);
            commandHistory.unshift(trimmed);
            historyIndex = -1;
            
            // Execute command
            if (commands[trimmed]) {
                const output = commands[trimmed].execute();
                if (output) {
                    addOutput(output);
                }
            } else {
                addOutput(`<span class="error">Command not found: ${cmd}</span>\n\nType '<span class="warning">help</span>' to see available commands.`);
            }
            
            // Scroll to bottom
            terminal.scrollTop = terminal.scrollHeight;
        }
        
        // Handle input
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmd = input.value;
                processCommand(cmd);
                input.value = '';
                cursorIndicator.style.display = 'inline';
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    input.value = commandHistory[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    input.value = commandHistory[historyIndex];
                } else {
                    historyIndex = -1;
                    input.value = '';
                }
            } else if (e.key === 'Tab') {
                e.preventDefault();
                const partial = input.value.toLowerCase();
                const matches = Object.keys(commands).filter(cmd => cmd.startsWith(partial));
                if (matches.length === 1) {
                    input.value = matches[0];
                }
            } else if (e.key === 'l' && e.ctrlKey) {
                e.preventDefault();
                commands.clear.execute();
            }
        });
        
        // Toggle cursor visibility based on input content
        input.addEventListener('input', () => {
            cursorIndicator.style.display = input.value.length > 0 ? 'none' : 'inline';
        });
        
        // Keep focus on input
        document.addEventListener('click', () => {
            input.focus();
        });
        
        // Initialize on load
        init();
    </script>
